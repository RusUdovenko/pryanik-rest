<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Админ-панель Пряник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #3b2623 0%, #5d3e38 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
            color: #3b2623;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #5d3e38;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0d5cc;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fef7f0;
        }
        
        input:focus {
            outline: none;
            border-color: #b9e0cd;
            background-color: white;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: #3b2623;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #5d3e38;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Админ-панель</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" placeholder="pryanik">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                
                <button type="submit">Войти</button>
                
                <div class="error-message" id="errorMessage"></div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'pryanik' && password === 'pryanik') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('errorMessage').textContent = 'Неверный логин или пароль';
            }
        });
        
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
